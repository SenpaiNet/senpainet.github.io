<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>先輩ポートフォリオ | SenpaiNet</title>
  <link rel="stylesheet" href="archive.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    /* 追加ボタンエリア */
    .header-actions { text-align: center; margin-bottom: 30px; min-height: 50px; }
    
    .toggle-form-btn {
      background: #3b82f6; color: white; border: none;
      padding: 12px 30px; border-radius: 50px; font-weight: bold; font-size: 1rem;
      cursor: pointer; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
      transition: all 0.2s; display: none; align-items: center; gap: 8px; margin: 0 auto;
    }
    .toggle-form-btn:hover { transform: translateY(-2px); background: #2563eb; }

    /* プロフィール入力ボックス（最初は隠す） */
    .profile-input-box {
      max-width: 600px; margin: 0 auto 40px; 
      background: white; padding: 30px; border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: none; animation: slideDown 0.3s ease;
      border: 1px solid #e2e8f0;
    }
    .profile-input-box.active { display: block; }
    
    /* フォームパーツ */
    .input-group { margin-bottom: 15px; }
    .input-label { display: block; font-weight: bold; color: #475569; margin-bottom: 5px; font-size: 0.9rem; }
    .input-field {
      width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;
      font-size: 1rem; box-sizing: border-box; transition: 0.2s; background: #f8fafc;
    }
    .input-field:focus { border-color: #3b82f6; outline: none; background: #fff; }
    
    .row { display: flex; gap: 15px; }
    .col { flex: 1; }

    /* タグ選択エリア用スタイル */
    .preset-tags-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .selectable-tag {
        font-size: 0.8rem; padding: 4px 12px; border-radius: 20px; border: 1px solid #e2e8f0;
        background: #fff; color: #64748b; cursor: pointer; transition: 0.2s;
    }
    .selectable-tag.selected { background: #3b82f6; color: #fff; border-color: #3b82f6; }

    .add-submit-btn {
      width: 100%; background: #1e3a8a; color: white; border: none;
      padding: 12px; border-radius: 8px; font-weight: bold; font-size: 1rem;
      cursor: pointer; margin-top: 10px; transition: 0.2s;
    }
    .add-submit-btn:hover { background: #172554; }

    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="list-page">

<header class="navbar fade-down">
  <div class="navbar-container">
    <div class="navbar-logo">
      <a href="index.html">SenpaiNet</a>
    </div>

    <nav class="navbar-menu">
      <a href="post.html">相談する</a>
      <a href="archive.html">相談を見る</a>
      <a href="senpai.html">先輩一覧</a>
      <a href="contact.html">お問い合わせ</a>
      
      <a href="signup.html" class="account-btn">👤 アカウント</a>
    </nav>
  </div>
</header>

  <main>
    <section class="header">
      <h1>🎓 先輩ポートフォリオ</h1>
      <p style="color:#666; margin-bottom:20px;">あなたの情報をカードにして表示します</p>

      <div class="header-actions">
        <button id="toggleFormBtn" class="toggle-form-btn">
          <span>＋ プロフィールカードを作成</span>
        </button>
        <p id="notSenpaiMsg" style="display:none; color:#94a3b8; font-size:0.9rem;">※プロフィール作成は先輩ユーザーのみ可能です</p>
      </div>

      <div id="profileFormArea" class="profile-input-box">
        <h3 style="margin-top:0; color:#1e3a8a; margin-bottom:20px;">登録情報を元に作成</h3>
        <p style="font-size:0.85rem; color:#666; margin-bottom:15px;">※内容はここで自由に修正できます</p>
        
        <div class="row">
            <div class="col input-group">
                <label class="input-label">名前 (ニックネーム)</label>
                <input type="text" id="inputName" class="input-field" placeholder="例: 名無し先輩">
            </div>
            <div class="col input-group">
                <label class="input-label">学年・属性</label>
                <input type="text" id="inputGrade" class="input-field" placeholder="例: 大学3年">
            </div>
        </div>

        <div class="input-group">
            <label class="input-label">自己紹介・経歴</label>
            <textarea id="inputBio" class="input-field" rows="3" placeholder="経歴や得意分野を入力してください..."></textarea>
        </div>

        <div class="input-group">
            <label class="input-label">タグ (カンマ区切り)</label>
            <input type="text" id="inputTags" class="input-field" placeholder="例: 理系, サッカー部, 海外大">
            <div id="presetTagsArea" class="preset-tags-container"></div>
        </div>

        <button id="addCardBtn" class="add-submit-btn">この内容でカードを表示</button>
      </div>
    </section>

    <section class="post-list" id="senpaiList">
        <p id="emptyMsg" style="text-align:center; color:#ccc; grid-column:1/-1; padding: 40px;">
            読み込み中...
        </p>
    </section>
  </main>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="auth_header.js"></script>
  <script type="module" src="senpai.js"></script>
</body>
</html>
